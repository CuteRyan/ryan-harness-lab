# harness-design preset — 규칙·스킬 설계 (researcher [docs-researcher 통합] + auditor + architect)
#
# 마스터플랜 §2.4 ② 회의실 preset 표 (L229~238) "harness-design = 3명 (researcher/auditor/architect)" 1:1 정합.
# Step A 12 agent (#009-A turn 11 PASS) 中 docs-researcher (researcher 통합 = D-15) / auditor / architect 호출.
# 양식 출처: wshobson/agents HEAD `ece811f23310a37ceb43496dbac0e244fe6845b6` (2026-05-02)
#   `plugins/agent-teams/skills/team-composition-patterns/references/preset-teams.md` (도메인 특화 변형).
# 단계 의존성: zircote 7패턴 中 Pipeline (researcher → architect → auditor).
#
# D-15 명시 (turn 11, #009-A): harness-design preset 의 "researcher" 직책 = docs-researcher 통합.
#   별도 researcher agent 신설 X. docs-researcher 가 공식 docs · 표준 · best practice 조사를 모두 담당.

name: harness-design
description: 하네스 규칙·스킬 설계 — researcher (조사) → architect (설계) → auditor (검증) Pipeline. 도메인 특화 preset.
source:
  - "마스터플랜 §2.4 ② 회의실 preset 표 (harness-design = 3명 researcher/auditor/architect)"
  - "wshobson/agents HEAD ece811f2 preset-teams.md (도메인 특화 변형)"
  - "zircote 7패턴 中 Pipeline (researcher → architect → auditor)"
  - "Step A 12 agent (#009-A turn 11 PASS, agents/{docs-researcher|architect|auditor}.md)"
  - "D-15 (turn 11): harness-design 의 'researcher' = docs-researcher 통합"

pm_lead: pm
team_size: 3
display_mode: tmux

# D-15 통합 결정에 따라 'researcher' 직책 = docs-researcher (공식 docs 차원 그대로 활용).
# harness-design 도메인 (규칙·스킬·훅·워크플로 설계) 에서는 공식 문서 + 표준 + best practice 가 주요 조사 영역이므로
# docs-researcher 의 전문 영역과 100% 일치. 별도 researcher agent 신설은 중복.
members:
  - name: docs-researcher
    model: sonnet
    dimension: 조사 (researcher 통합)
    sequence: 1                # Pipeline 1단계 (선행)
    focus_areas:
      - "Claude Code 공식 docs (anthropic.com/engineering · CLAUDE.md spec · hooks reference)"
      - "Anthropic SDK · Claude API 공식"
      - "외부 하네스 사례 (wshobson · aws-samples · zircote · revfactory · oh-my-claudecode)"
      - "표준 사양 (YAML · JSON Schema · Bash POSIX · PowerShell 5.1)"
      - "best practice (외부 리서치 의무 — 글로벌 ~/.claude/rules/research-mandatory.md)"

  - name: architect
    model: opus                # 설계 결정 = Opus 영역
    dimension: 설계
    sequence: 2                # researcher 후 (addBlockedBy: docs-researcher)
    blocked_by: [docs-researcher]
    focus_areas:
      - "규칙·스킬·훅·워크플로 시스템 설계 (5W1H + 트레이드오프)"
      - "ADR (배경·결론·사유·대안) — 결정 동시 기록"
      - "입출력 계약 (스킬 frontmatter · 훅 PreToolUse/PostToolUse · 워크플로 진입/종료)"
      - "의존 관계 명시 (addBlockedBy 체인 + 스테이징/운영 분리 — D-11 정책)"
      - "확장성 평가 (스킬 양식 일관성 · 훅 hot-reload · OS 호환 [Windows/POSIX])"

  - name: auditor
    model: sonnet
    dimension: 검증
    sequence: 3                # architect 후 (addBlockedBy: architect)
    blocked_by: [architect]
    focus_areas:
      - "audit 양식 4 섹션 (대상 · 기준 · 결과 [적합도 % + 불일치 표] · 조치 필요 [우선순위])"
      - "적합도 평가 (코드 ↔ 설계문서 1:1 대조, % + 항목별 일치/불일치 표)"
      - "미적용 항목 detection (설계 ↔ 코드 양방향)"
      - "우선순위 평가 (Critical/High/Medium/Low)"
      - "회귀 위험 평가 (audit 後 수정 시 예상 회귀 영역)"

task_template:
  subject: "[명사형 - 하네스 설계 주제] (예: '글로벌 외부 리서치 의무 규칙 신설 + 검증')"
  description: |
    설계 주제 + 동기 (왜 필요한가, 어떤 문제 해결) + 영향 범위 (어떤 프로젝트·스킬·훅) + 출처 의무 명시.
    researcher → architect → auditor Pipeline 순차 진행. 각 단계 산출물은 다음 단계 입력.
  output_format_required:
    - 결론 (1~2줄): 단계별 결과 (조사 결과 / ADR 결정 / 적합도 % + 미적용 항목)
    - 출처: URL + 발행일 + 직접 인용 1~2줄 (Claude Code docs · 외부 하네스 HEAD SHA · 표준 사양)
    - 추측 표현 금지 (paraphrase 가 아닌 직접 인용 권장 — 글로벌 rules/research-mandatory.md §3)
    - 자기비판 1줄 (출처 신뢰도 한계 + ADR 회귀 위험 + audit false positive 가능성)

protocol:
  enforcement: 4-step 강제 (글로벌 ~/.claude/rules/agent-spawn-model.md)
  steps:
    - "1. TeamCreate (팀 생성)"
    - "2. TaskCreate (researcher → architect → auditor Pipeline addBlockedBy 체인)"
    - "3. Agent spawn (model 명시 의무 — pm/architect=opus, 나머지=sonnet, 강제 훅 활성)"
    - "4. SendMessage (단계 결과 다음 단계로 전달, auditor 결과는 PM 이 사장에게 종합 보고)"

review_cycle_cap: 3
escalation_after_cap:
  primary_actor: pm
  primary_action: "설계 재시도"
  primary_trigger: "3 사이클 초과 (ADR 결정 합의 실패 · auditor 적합도 < 임계 반복)"
  fallback_actor: main
  fallback_action: "SendMessage 로 사장 에스컬레이션 (R-5 컨펌 트리거)"
  source: "aws-samples/sample-claude-code-agent-team HEAD 67840be3 skills/spec-workflow/SKILL.md:65"
  source_quote: "Max 3 review cycles per group, then escalate"

variations:
  default:
    members: [docs-researcher, architect, auditor]
    description: "기본 3 단계 Pipeline (조사 → 설계 → 검증)"
  design_only:               # 검증 단계 별도 turn 분리 (architect 까지만)
    members: [docs-researcher, architect]
    team_size: 2
    description: "auditor 단계 분리 (대규모 설계 후 별도 audit turn)"
